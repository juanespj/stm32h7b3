# Display configuration
CONFIG_DISPLAY=y
CONFIG_STM32_LTDC=y
CONFIG_STM32_LTDC_RGB565=y

# Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# GPIO for LEDs and touch
CONFIG_GPIO=y

# LVGL runs SYS_INIT before main() on this stack; default 1024 B overflows (MPU fault).
CONFIG_MAIN_STACK_SIZE=8192

# Logging
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# System heap (k_malloc). LTDC framebuffer and LVGL VDB are static — do not
# size this like the framebuffer; a 1 MiB heap overflows AXI SRAM with LVGL.
CONFIG_HEAP_MEM_POOL_SIZE=262144

# Framebuffer in internal SRAM
CONFIG_STM32_LTDC_FB_NUM=1
# CONFIG_STM32_LTDC_FB_USE_SHARED_MULTI_HEAP is not set

# LVGL configuration (v9.5.0)
CONFIG_LVGL=y
CONFIG_LV_CONF_SKIP=y
CONFIG_LV_COLOR_DEPTH_16=y
# Zephyr uses lvgl_malloc() + dedicated sys_heap; pool size is LV_Z_MEM_POOL_SIZE, not LV_MEM_SIZE_*.
CONFIG_LV_Z_MEM_POOL_SIZE=65536

# LVGL logging
CONFIG_LV_USE_LOG=y
CONFIG_LV_LOG_LEVEL_INFO=y

# LVGL display buffer (display comes from devicetree chosen zephyr,display)
CONFIG_LV_Z_VDB_SIZE=64

# stm32h7b3i_dk defaults put LVGL VDB in SDRAM2 with double buffering + full refresh
# (see boards/st/stm32h7b3i_dk/Kconfig.defconfig). app.overlay disables FMC, so SDRAM
# is unusable — keep VDB in main RAM and drop the SDRAM-oriented buffer defaults.
CONFIG_LV_Z_VDB_ZEPHYR_REGION=n
CONFIG_LV_Z_DOUBLE_VDB=n
CONFIG_LV_Z_FULL_REFRESH=n

# Input/Touch
CONFIG_INPUT=y
CONFIG_INPUT_FT5336=y

# I2C for touch controller
CONFIG_I2C=y
