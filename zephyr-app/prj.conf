# Display configuration
CONFIG_DISPLAY=y
CONFIG_STM32_LTDC=y
CONFIG_STM32_LTDC_RGB565=y

# Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# GPIO for LEDs
CONFIG_GPIO=y

# Logging
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Heap for k_malloc - needs ~510KB for 480x272x4 framebuffer
CONFIG_HEAP_MEM_POOL_SIZE=524288

# Framebuffer in internal SRAM (Renode: no FMC/SDRAM emulation)
CONFIG_STM32_LTDC_FB_NUM=1
# Disable SMH - no SDRAM regions registered in Renode
# CONFIG_STM32_LTDC_FB_USE_SHARED_MULTI_HEAP is not set
