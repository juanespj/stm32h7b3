[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip STM32H7B3LIHxQ"
rustflags = [
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
  # This prevents the linker from discarding the vector table
  "-C", "link-arg=--nmagic",
]

[build]
target = "thumbv7em-none-eabihf"

[env]
DEFMT_LOG = "info"# / trace

